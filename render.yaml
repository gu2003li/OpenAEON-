services:
  - type: web
    name: openaeon
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENAEON_STATE_DIR
        value: /data/.openaeon
      - key: OPENAEON_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENAEON_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openaeon-data
      mountPath: /data
      sizeGB: 1
