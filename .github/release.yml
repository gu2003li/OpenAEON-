changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - octocat
  categories:
    - title: "🚀 New Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "📚 Documentation"
      labels:
        - documentation
        - docs
    - title: "🧰 Maintenance & CI"
      labels:
        - chore
        - build
        - ci
    - title: "🧪 Testing"
      labels:
        - test
        - testing
    - title: "🧹 Refactor & Cleanup"
      labels:
        - refactor
        - cleanup
