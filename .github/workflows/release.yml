name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Bundle Chrome Extension
        run: |
          mkdir -p dist/extension
          cp -r assets/chrome-extension/* dist/extension/
          cd dist/extension && zip -r ../../openaeon-browser-relay.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            openaeon-browser-relay.zip
          generate_release_notes: true
          draft: false
          prerelease: false
