services:
  openaeon-gateway:
    image: ${OPENAEON_IMAGE:-openaeon:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENAEON_GATEWAY_TOKEN: ${OPENAEON_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${OPENAEON_CONFIG_DIR}:/home/node/.openaeon
      - ${OPENAEON_WORKSPACE_DIR}:/home/node/.openaeon/workspace
    ports:
      - "${OPENAEON_GATEWAY_PORT:-18789}:18789"
      - "${OPENAEON_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENAEON_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  openaeon-cli:
    image: ${OPENAEON_IMAGE:-openaeon:local}
    network_mode: "service:openaeon-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENAEON_GATEWAY_TOKEN: ${OPENAEON_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${OPENAEON_CONFIG_DIR}:/home/node/.openaeon
      - ${OPENAEON_WORKSPACE_DIR}:/home/node/.openaeon/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openaeon-gateway
